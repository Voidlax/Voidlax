name: generate snake

# builds the animated contribution-snake svg and pushes it to the `output`
# branch, where the README pulls it from. runs every few hours + on push.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Voidlax
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=04bf8a&color_dots=181b22,0e4429,006d32,26a641,39d353

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
